<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Administrateur</title>
</head>

<body>

<h1>Admin</h1>

<table border="1" cellpadding="10">
  <thead>
    <tr>
      <th>Utilisateur</th>
      <th>Rôle</th>
      <th>Créer</th>
      <th>Modifier</th>
      <th>Supprimer</th>
    </tr>
  </thead>

  <tbody id="users"></tbody>
</table>

<script>

// =============================
// VARIABLES GLOBALES
// =============================
let csrfToken = "";

// =============================
// CHARGER LES UTILISATEURS
// =============================
async function loadUsers() {

  try {

    // 🔥 récupérer le CSRF token
    const tokenRes = await fetch("/liste/default", {
      credentials: "include"
    });
    const tokenData = await tokenRes.json();
    csrfToken = tokenData.csrfToken;

    // 🔥 récupérer les utilisateurs
    const res = await fetch("/admin/users", {
      credentials: "include"
    });
    const users = await res.json();

    const tbody = document.getElementById("users");
    tbody.innerHTML = "";

    users.forEach(u => {

      const row = document.createElement("tr");

      // =============================
      // USERNAME
      // =============================
      const tdUser = document.createElement("td");
      tdUser.textContent = u.username;

      // =============================
      // ROLE
      // =============================
      const tdRole = document.createElement("td");
      const select = document.createElement("select");

      const optionUser = document.createElement("option");
      optionUser.value = "user";
      optionUser.textContent = "User";
      if (u.role === "user") optionUser.selected = true;

      const optionAdmin = document.createElement("option");
      optionAdmin.value = "admin";
      optionAdmin.textContent = "Admin";
      if (u.role === "admin") optionAdmin.selected = true;

      select.appendChild(optionUser);
      select.appendChild(optionAdmin);

      select.onchange = () => setRole(u.id, select.value);

      tdRole.appendChild(select);

      // =============================
      // CHECKBOX PERMISSIONS
      // =============================
      function createCheckbox(permName, value) {
        const td = document.createElement("td");
        const checkbox = document.createElement("input");

        checkbox.type = "checkbox";
        checkbox.checked = !!value;

        checkbox.onchange = () => {
          setPerm(u.id, permName, checkbox.checked);
        };

        td.appendChild(checkbox);
        return td;
      }

      const tdCreate = createCheckbox("can_create", u.can_create);
      const tdEdit = createCheckbox("can_edit", u.can_edit);
      const tdDelete = createCheckbox("can_delete", u.can_delete);

      // =============================
      // AJOUT À LA LIGNE
      // =============================
      row.appendChild(tdUser);
      row.appendChild(tdRole);
      row.appendChild(tdCreate);
      row.appendChild(tdEdit);
      row.appendChild(tdDelete);

      tbody.appendChild(row);

    });

  } catch (err) {
    console.error("Erreur chargement users :", err);
  }
}

// =============================
// CHANGER LE ROLE
// =============================
async function setRole(id, role) {

  try {

    const res = await fetch("/admin/role", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "CSRF-Token": csrfToken
      },
      body: JSON.stringify({ id, role })
    });

    console.log("ROLE STATUS:", res.status);

    loadUsers();

  } catch (err) {
    console.error("Erreur role :", err);
  }
}

// =============================
// CHANGER UNE PERMISSION
// =============================
async function setPerm(id, perm, value) {

  try {

    const res = await fetch("/admin/permission", {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "CSRF-Token": csrfToken
      },
      body: JSON.stringify({
        id,
        perm,
        value
      })
    });

    console.log("PERM STATUS:", res.status);

  } catch (err) {
    console.error("Erreur permission :", err);
  }
}

// =============================
// INIT
// =============================
loadUsers();

</script>

</body>
</html>
